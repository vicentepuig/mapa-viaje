<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Mi Viaje · Europa 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: #F1F1F1;
  font-family: 'Inter', system-ui, sans-serif;
  overflow: hidden;
  color: #341A02;
  -webkit-font-smoothing: antialiased;
  touch-action: none;
}
canvas { display: block; position: fixed; inset: 0; width: 100%; height: 100%; touch-action: none; }

/* Header */
#header {
  position: fixed; top: env(safe-area-inset-top, 0px); left: 0; right: 0;
  z-index: 20; padding: 14px 18px 10px;
  display: flex; align-items: center; justify-content: space-between;
  pointer-events: none;
}
#header-title h1 { font-size: .92rem; font-weight: 600; color: #341A02; }
#header-title p  { font-size: .62rem; color: rgba(52,26,2,.45); margin-top: 2px; }
#legend-pill {
  display: flex; flex-direction: column; gap: 4px;
  background: #F1F1F1; border: 0.75px solid #341A02; padding: 7px 10px;
}
.leg { display: flex; align-items: center; gap: 6px; font-size: .62rem; color: #341A02; }
.leg-line { width: 18px; height: 0.75px; flex-shrink: 0; }
.leg-dot  { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

/* Timeline strip */
#bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 20; padding-bottom: env(safe-area-inset-bottom, 0px); }
#timeline-scroll {
  overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; padding: 10px 14px 14px; display: flex; gap: 8px;
}
#timeline-scroll::-webkit-scrollbar { display: none; }
.tl {
  flex-shrink: 0; background: #F1F1F1; border: 0.75px solid #341A02;
  padding: 9px 12px; cursor: pointer; min-width: 155px; transition: background .15s;
  -webkit-tap-highlight-color: transparent;
}
.tl:active, .tl.active { background: rgba(52,26,2,.08); }
.tl-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.tl-date   { font-size: .6rem; color: rgba(52,26,2,.45); font-weight: 500; letter-spacing: .04em; text-transform: uppercase; }
.tl-route  { font-size: .78rem; font-weight: 600; color: #341A02; }
.tl-sub    { font-size: .63rem; color: rgba(52,26,2,.5); margin-top: 2px; }

/* Sheet backdrop */
#sheet-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0); z-index: 30;
  display: none; transition: background .25s;
}
#sheet-backdrop.visible { background: rgba(0,0,0,.2); }

/* Bottom sheet */
#sheet {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 40;
  background: #F1F1F1;
  border-top: 0.75px solid #341A02;
  border-left: 0.75px solid #341A02;
  border-right: 0.75px solid #341A02;
  padding-bottom: env(safe-area-inset-bottom, 16px);
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.32,.72,0,1);
  touch-action: pan-y;
  max-height: 82vh;
  overflow-y: auto;
}
#sheet.open { transform: translateY(0); }
#sheet-handle-area { display: flex; justify-content: center; padding: 12px 0 4px; cursor: pointer; position: sticky; top: 0; background: #F1F1F1; z-index: 1; }
#sheet-handle { width: 36px; height: 3px; background: rgba(52,26,2,.2); border-radius: 2px; }

#sheet-content { padding: 4px 18px 24px; }

/* Card typography */
.sc-city    { font-size: 1.2rem; font-weight: 700; color: #341A02; letter-spacing: -.01em; }
.sc-country { font-size: .7rem; color: rgba(52,26,2,.45); margin-top: 2px; margin-bottom: 12px; }
.divider    { height: 0.75px; background: rgba(52,26,2,.12); margin: 10px 0; }
.sc-section { margin-top: 12px; }
.sc-label   { font-size: .6rem; font-weight: 600; color: rgba(52,26,2,.45); letter-spacing: .07em; text-transform: uppercase; margin-bottom: 6px; }
.sc-value   { font-size: .8rem; color: #341A02; line-height: 1.5; }

/* Dates grid */
.dates-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.date-block { display: flex; flex-direction: column; gap: 2px; }
.date-tag   { font-size: .58rem; font-weight: 600; color: rgba(52,26,2,.4); letter-spacing: .07em; text-transform: uppercase; }
.date-val   { font-size: .78rem; font-weight: 500; color: #341A02; }
.date-time  { font-size: .68rem; color: rgba(52,26,2,.55); margin-top: 1px; }

/* Transport rows */
.transport-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 0; border-bottom: 0.75px solid rgba(52,26,2,.08);
}
.transport-row:last-child { border-bottom: none; }
.tr-icon { flex-shrink: 0; margin-top: 1px; }
.tr-body { flex: 1; }
.tr-name { font-size: .78rem; font-weight: 600; color: #341A02; }
.tr-detail { font-size: .7rem; color: rgba(52,26,2,.55); margin-top: 2px; line-height: 1.4; }

/* Notes */
.notes-box {
  background: rgba(52,26,2,.05);
  border-left: 2px solid rgba(52,26,2,.2);
  padding: 8px 10px;
  margin-top: 2px;
}
.notes-box p { font-size: .75rem; color: rgba(52,26,2,.7); line-height: 1.5; }

/* Badges */
.badges { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 6px; }
.badge  { padding: 3px 10px; font-size: .67rem; font-weight: 500; display: inline-flex; align-items: center; gap: 5px; border: none; }
.badge-flight { background: #00AAFF; color: #341A02; }
.badge-train  { background: #FF4400; color: #341A02; }
.badge-stay   { background: #341A02; color: #F1F1F1; }

/* Loading */
#loading {
  position: fixed; inset: 0; background: #F1F1F1;
  display: flex; align-items: center; justify-content: center;
  z-index: 100; flex-direction: column; gap: 12px;
}
#loading p { color: rgba(52,26,2,.4); font-size: .78rem; letter-spacing: .06em; }
.spinner {
  width: 24px; height: 24px;
  border: 0.75px solid rgba(52,26,2,.12);
  border-top-color: #341A02;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg) } }
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>Cargando mapa…</p></div>
<canvas id="globe"></canvas>

<div id="header">
  <div id="header-title">
    <h1>Viaje Europa 2026</h1>
    <p>20 Mayo — 13 Junio</p>
  </div>
  <div id="legend-pill">
    <div class="leg"><div class="leg-line" style="background:#00AAFF"></div>Vuelo</div>
    <div class="leg">
      <svg width="18" height="4" style="flex-shrink:0"><line x1="0" y1="2" x2="18" y2="2" stroke="#FF4400" stroke-width="0.75" stroke-dasharray="3,3"/></svg>Tren
    </div>
    <div class="leg"><div class="leg-dot" style="background:#341A02;border:1px solid #341A02"></div>Ciudad</div>
  </div>
</div>

<div id="bottom-bar"><div id="timeline-scroll"></div></div>

<div id="sheet-backdrop" onclick="closeSheet()"></div>
<div id="sheet">
  <div id="sheet-handle-area" onclick="closeSheet()"><div id="sheet-handle"></div></div>
  <div id="sheet-content"></div>

<script>
// ── Icons ─────────────────────────────────────────────────────────────────────

};

// ── Data ──────────────────────────────────────────────────────────────────────
const CITIES = {

  bogota:    { name:'Bogotá',    country:'Colombia',     lat:  4.7110, lng:-74.0721 },
  barcelona: { name:'Barcelona', country:'España',       lat: 41.3851, lng:  2.1734 },
  amsterdam: { name:'Amsterdam', country:'Países Bajos', lat: 52.3676, lng:  4.9041 },
  berlin:    { name:'Berlín',    country:'Alemania',     lat: 52.5200, lng: 13.4050 },
  innsbruck: { name:'Innsbruck', country:'Austria',      lat: 47.2692, lng: 11.4041 },
  lyon:      { name:'Lyon',      country:'Francia',      lat: 45.7640, lng:  4.8357 },
};

const CITY_INFO = {

    transport: [
      { type:'flight', name:'AV 98 — Llegada', detail:'Santiago (SCL) → Bogotá (BOG)\n20 mayo · 6:40 AM → 11:30 AM' },
      { type:'flight', name:'AV 18 — Salida', detail:'Bogotá (BOG) → Barcelona (BCN)\n20 mayo · 3:35 PM → 8:45 AM +1' },

    transport: [
      { type:'flight', name:'AV 18 — Llegada', detail:'Bogotá (BOG) → Barcelona (BCN)\n21 mayo · llega ~8:45 AM' },
      { type:'flight', name:'KL 1510 — Salida', detail:'Barcelona (BCN) → Amsterdam (AMS)\n26 mayo · 6:20 AM → 8:35 AM' },
      { type:'flight', name:'AV 19 — Regreso', detail:'Barcelona (BCN) → Bogotá (BOG)\n13 junio · 1:50 PM → 5:45 PM' },

      { type:'train', name:'Tren — Parada', detail:'Innsbruck → Lyon → Barcelona\n10 junio · horario por definir' },
    ],
    notes: 'Parada intermedia en el trayecto Innsbruck–Barcelona.',
    badges: ['train'],
  },
};

const ROUTES = [
  { from:'santiago',  to:'bogota',    type:'flight', label:'AV 98',   date:'20 mayo',  time:'6:40 AM → 11:30 AM' },
  { from:'bogota',    to:'barcelona', type:'flight', label:'AV 18',   date:'20 mayo',  time:'3:35 PM → 8:45 AM +1' },
  { from:'barcelona', to:'amsterdam', type:'flight', label:'KL 1510', date:'26 mayo',  time:'6:20 AM → 8:35 AM' },
  { from:'amsterdam', to:'berlin',    type:'train',  label:'Tren',    date:'29 mayo',  time:'Por definir' },
  { from:'berlin',    to:'innsbruck', type:'train',  label:'Tren',    date:'6 junio',  time:'Por definir' },
  { from:'innsbruck', to:'lyon',      type:'train',  label:'Tren',    date:'10 junio', time:'Por definir' },
  { from:'lyon',      to:'barcelona', type:'train',  label:'Tren',    date:'10 junio', time:'Por definir' },
  { from:'barcelona', to:'bogota',    type:'flight', label:'AV 19',   date:'13 junio', time:'1:50 PM → 5:45 PM' },
  { from:'bogota',    to:'santiago',  type:'flight', label:'AV 97',   date:'13 junio', time:'9:35 PM → 4:45 AM +1' },
];

// ── Globe ─────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('globe');
const ctx    = canvas.getContext('2d');
let W, H, projection, path, world = null;
let rotation = [-10,-18,0], dragging = false, lastPos = null, lastTouchDist = null;
let zoomK = 1, autoRotate = true, autoTimer = null;

function getScale(){ return Math.min(W,H) * 0.44 * zoomK; }
function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; buildProjection(); }
function buildProjection(){
  projection = d3.geoOrthographic().scale(getScale()).translate([W/2, H/2-30]).rotate(rotation).clipAngle(90);
  path = d3.geoPath(projection, ctx);
}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.beginPath(); path({type:'Sphere'}); ctx.clip();
  if(world){
    topojson.feature(world, world.objects.countries).features.forEach(f=>{
      ctx.beginPath(); path(f); ctx.fillStyle='#341A02'; ctx.fill();
    });
    ctx.beginPath();
    path(topojson.mesh(world, world.objects.countries, (a,b)=>a!==b));
    ctx.strokeStyle='rgba(241,241,241,.2)'; ctx.lineWidth=0.4; ctx.stroke();
  }
  ctx.restore();
  ctx.beginPath(); path({type:'Sphere'}); ctx.strokeStyle='#341A02'; ctx.lineWidth=0.75; ctx.stroke();
  ROUTES.forEach(drawArc);
  Object.entries(CITIES).forEach(([key,c])=>drawCity(key,c));
}

function drawArc(route){
  const from=CITIES[route.from], to=CITIES[route.to];
  const color=route.type==='flight'?'#00AAFF':'#FF4400';
  const interp=d3.geoInterpolate([from.lng,from.lat],[to.lng,to.lat]);
  ctx.save(); ctx.beginPath();
  let first=true;
  for(let i=0;i<=100;i++){
    const [lng,lat]=interp(i/100);
    if(d3.geoDistance([lng,lat],[-rotation[0],-rotation[1]])>Math.PI/2){first=true;continue;}
    const [x,y]=projection([lng,lat]);
    first?ctx.moveTo(x,y):ctx.lineTo(x,y); first=false;
  }
  ctx.strokeStyle=color; ctx.lineWidth=0.75;
  if(route.type==='train') ctx.setLineDash([3,3]);
  ctx.stroke(); ctx.setLineDash([]); ctx.restore();
}

function drawCity(key, city){
  if(d3.geoDistance([city.lng,city.lat],[-rotation[0],-rotation[1]])>Math.PI/2) return;
  const [x,y]=projection([city.lng,city.lat]);

  // Dot
  ctx.beginPath(); ctx.arc(x,y,4,0,2*Math.PI);
  ctx.fillStyle='#F1F1F1'; ctx.strokeStyle='#341A02'; ctx.lineWidth=1;
  ctx.fill(); ctx.stroke();

  // Label tag
  ctx.font = '500 10.5px Inter, system-ui, sans-serif';
  const tw = ctx.measureText(city.name).width;
  const tx = x + 9, ty = y - 5;
  const pad = 3;
  // tag background
  ctx.fillStyle = '#F1F1F1';
  ctx.fillRect(tx - pad, ty - 10, tw + pad*2, 14);
  // tag border
  ctx.strokeStyle = 'rgba(52,26,2,.25)';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(tx - pad, ty - 10, tw + pad*2, 14);
  // label text
  ctx.fillStyle = '#341A02';
  ctx.fillText(city.name, tx, ty + 1);
}

function animate(){
  if(autoRotate) rotation[0]+=0.1;
  buildProjection(); draw();
  requestAnimationFrame(animate);
}

// ── Interaction ───────────────────────────────────────────────────────────────
function pauseAuto(resume=4000){ autoRotate=false; clearTimeout(autoTimer); if(resume) autoTimer=setTimeout(()=>{autoRotate=true;},resume); }

canvas.addEventListener('mousedown', e=>{ dragging=true; lastPos=[e.clientX,e.clientY]; pauseAuto(0); });
window.addEventListener('mouseup',   ()=>{ dragging=false; autoTimer=setTimeout(()=>{autoRotate=true;},4000); });
window.addEventListener('mousemove', e=>{
  if(!dragging) return;
  const dx=e.clientX-lastPos[0], dy=e.clientY-lastPos[1];
  rotation[0]+=dx*.3; rotation[1]=Math.max(-80,Math.min(80,rotation[1]-dy*.3));
  lastPos=[e.clientX,e.clientY];
});
canvas.addEventListener('wheel', e=>{ e.preventDefault(); zoomK*=e.deltaY<0?1.1:0.91; zoomK=Math.max(.5,Math.min(4,zoomK)); },{passive:false});

canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  if(e.touches.length===1){ dragging=true; lastPos=[e.touches[0].clientX,e.touches[0].clientY]; pauseAuto(0); }
  else if(e.touches.length===2) lastTouchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
},{passive:false});
canvas.addEventListener('touchend', e=>{
  e.preventDefault();
  if(e.touches.length===0){ dragging=false; lastTouchDist=null; autoTimer=setTimeout(()=>{autoRotate=true;},4000); }
},{passive:false});
canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  if(e.touches.length===1&&dragging){
    const dx=e.touches[0].clientX-lastPos[0], dy=e.touches[0].clientY-lastPos[1];
    rotation[0]+=dx*.3; rotation[1]=Math.max(-80,Math.min(80,rotation[1]-dy*.3));
    lastPos=[e.touches[0].clientX,e.touches[0].clientY];
  } else if(e.touches.length===2&&lastTouchDist!=null){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    zoomK*=d/lastTouchDist; zoomK=Math.max(.5,Math.min(4,zoomK)); lastTouchDist=d;
  }
},{passive:false});

canvas.addEventListener('click', e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  for(const [key,city] of Object.entries(CITIES)){
    if(d3.geoDistance([city.lng,city.lat],[-rotation[0],-rotation[1]])>Math.PI/2) continue;
    const [cx,cy]=projection([city.lng,city.lat]);
    if(Math.hypot(mx-cx,my-cy)<18){ openSheet(key); return; }
  }
});

function flyTo(lng,lat,dur=900){
  pauseAuto(0);
  const start=[...rotation],end=[-lng,-lat,0],t0=Date.now();
  (function step(){
    const t=Math.min(1,(Date.now()-t0)/dur);
    const ease=t<.5?2*t*t:-1+(4-2*t)*t;
    rotation[0]=start[0]+(end[0]-start[0])*ease;
    rotation[1]=start[1]+(end[1]-start[1])*ease;
    if(t<1) requestAnimationFrame(step);
    else autoTimer=setTimeout(()=>{autoRotate=true;},5000);
  })();
}

// ── Sheet ─────────────────────────────────────────────────────────────────────
const sheet=document.getElementById('sheet');
const backdrop=document.getElementById('sheet-backdrop');
const sheetContent=document.getElementById('sheet-content');

function openSheet(key){
  const city=CITIES[key], info=CITY_INFO[key];
  if(!info) return;

  // Dates
  const datesHTML=`
    <div class="dates-grid">
      <div class="date-block">
        <div class="date-tag">Llegada</div>
        <div class="date-val">${info.arrival.date}</div>
        <div class="date-time">${info.arrival.time}</div>
      </div>
      <div class="date-block">
        <div class="date-tag">Salida</div>
        <div class="date-val">${info.departure.date}</div>
        <div class="date-time">${info.departure.time}</div>
      </div>
    </div>`;

  // Transport
  const transportHTML=(info.transport||[]).map(t=>`
    <div class="transport-row">
      <div class="tr-icon">${t.type==='flight'?IC.flightUi:IC.trainUi}</div>
      <div class="tr-body">
        <div class="tr-name">${t.name}</div>
        <div class="tr-detail">${t.detail.replace(/\n/g,'<br>')}</div>
      </div>
    </div>`).join('');

  // Stay
  const stayHTML=info.stayLabel?`
    <div class="sc-section">
      <div class="sc-label">Alojamiento</div>
      <div class="sc-value" style="white-space:pre-line">${info.stay}</div>
    </div><div class="divider"></div>`:'';

  // Badges
  const badgeMap={
    flight:{cls:'badge-flight',icon:IC.flightUi,label:'Vuelo'},
    train: {cls:'badge-train', icon:IC.trainUi,  label:'Tren'},
    stay:  {cls:'badge-stay',  icon:IC.stayLight, label: info.stayLabel||'Alojamiento'},
  };
  const badges=(info.badges||[]).filter(b=>!(b==='stay'&&!info.stayLabel)).map(b=>{
    const{cls,icon,label}=badgeMap[b];
    return `<span class="badge ${cls}">${icon}${label}</span>`;
  }).join('');

  sheetContent.innerHTML=`
    <div class="sc-city">${city.name}</div>
    <div class="sc-country">${city.country}</div>
    <div class="divider"></div>

    <div class="sc-section">
      <div class="sc-label">Fechas</div>
      ${datesHTML}
    </div>
    <div class="divider"></div>

    ${stayHTML}

    <div class="sc-section">
      <div class="sc-label">Transporte</div>
      ${transportHTML}
    </div>
    <div class="divider"></div>

    <div class="sc-section">
      <div class="sc-label">Notas</div>
      <div class="notes-box"><p>${info.notes}</p></div>
    </div>

    <div class="badges">${badges}</div>
  `;

  backdrop.style.display='block';
  requestAnimationFrame(()=>{ backdrop.classList.add('visible'); sheet.classList.add('open'); });
  flyTo(city.lng,city.lat);
}

function closeSheet(){
  sheet.classList.remove('open'); backdrop.classList.remove('visible');
  setTimeout(()=>{ backdrop.style.display='none'; },300);
  autoTimer=setTimeout(()=>{autoRotate=true;},500);
}

let sheetStartY=0;
sheet.addEventListener('touchstart', e=>{ sheetStartY=e.touches[0].clientY; },{passive:true});
sheet.addEventListener('touchmove',  e=>{ if(e.touches[0].clientY-sheetStartY>60) closeSheet(); },{passive:true});

// ── Timeline ──────────────────────────────────────────────────────────────────
const tlScroll=document.getElementById('timeline-scroll');
ROUTES.forEach((r,i)=>{
  const div=document.createElement('div');
  div.className='tl';
  div.innerHTML=`
    <div class="tl-header">
      <div class="tl-date">${r.date}</div>
      ${r.type==='flight'?IC.flightUi:IC.trainUi}
    </div>
    <div class="tl-route">${CITIES[r.from].name} → ${CITIES[r.to].name}</div>
    <div class="tl-sub">${r.label} · ${r.time}</div>
  `;
  div.addEventListener('click',()=>{
    document.querySelectorAll('.tl').forEach((el,j)=>el.classList.toggle('active',j===i));
    flyTo((CITIES[r.from].lng+CITIES[r.to].lng)/2,(CITIES[r.from].lat+CITIES[r.to].lat)/2,1000);
    openSheet(r.to);
  });
  tlScroll.appendChild(div);
});

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('resize', resize);
resize();
d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2.0.2/countries-110m.json')
  .then(data=>{ world=data; document.getElementById('loading').style.display='none'; animate(); })
  .catch(()=>{ document.getElementById('loading').style.display='none'; animate(); });
</script>
